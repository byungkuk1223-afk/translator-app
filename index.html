<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통역기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px 24px;
  }

  h1 { font-size: 18px; font-weight: 600; letter-spacing: 3px; color: #555; text-transform: uppercase; }

  .always-on-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .toggle-switch {
    position: relative;
    width: 52px;
    height: 28px;
    cursor: pointer;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    inset: 0;
    background: #2a2a36;
    border-radius: 28px;
    transition: 0.3s;
  }
  .slider:before {
    content: "";
    position: absolute;
    width: 20px; height: 20px;
    left: 4px; bottom: 4px;
    background: #555;
    border-radius: 50%;
    transition: 0.3s;
  }
  input:checked + .slider { background: #4f6ef7; }
  input:checked + .slider:before { transform: translateX(24px); background: #fff; }

  .toggle-label { font-size: 14px; color: #aaa; }
  .toggle-label span { color: #4f6ef7; font-weight: 600; }

  .lang-indicator {
    font-size: 13px;
    color: #444;
    background: #1e1e26;
    border-radius: 50px;
    padding: 6px 18px;
    min-width: 200px;
    text-align: center;
    transition: all 0.3s;
    border: 1px solid transparent;
  }
  .lang-indicator.ko { color: #f7c948; border-color: #3a3220; }
  .lang-indicator.en { color: #4fc3f7; border-color: #1a2f3a; }

  .mic-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .mic-btn {
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 3px solid #2a2a36;
    background: #1e1e26;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 40px;
  }
  .mic-btn:hover { border-color: #4f6ef7; transform: scale(1.04); }
  .mic-btn.listening {
    border-color: #4f6ef7;
    background: #1a1a2e;
    animation: glow 1.5s infinite;
  }
  .mic-btn.speaking {
    border-color: #2ecc71;
    background: #0d2018;
    animation: glow-green 1s infinite;
  }

  @keyframes glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(79,110,247,0.3); }
    50% { box-shadow: 0 0 0 16px rgba(79,110,247,0); }
  }
  @keyframes glow-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(46,204,113,0.3); }
    50% { box-shadow: 0 0 0 16px rgba(46,204,113,0); }
  }

  .mic-label { font-size: 13px; color: #555; text-align: center; }

  .results { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 10px; }

  .result-box {
    background: #1e1e26;
    border-radius: 16px;
    padding: 18px 20px;
    min-height: 68px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border: 1px solid transparent;
    transition: border-color 0.3s;
  }
  .result-box.active { border-color: #2a2a46; }

  .result-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #444; font-weight: 600; }
  .result-text { font-size: 16px; line-height: 1.6; color: #ccc; min-height: 24px; }
  .result-box.translated .result-label { color: #4f6ef7; }
  .result-box.translated .result-text { color: #fff; font-size: 18px; }

  .voice-section {
    width: 100%;
    max-width: 560px;
    background: #1e1e26;
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .voice-section-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #444; font-weight: 600; }

  .voice-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .voice-row label { font-size: 12px; color: #666; min-width: 60px; }

  select {
    background: #0f0f13;
    color: #ccc;
    border: 1px solid #2a2a36;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    flex: 1;
    min-width: 0;
    cursor: pointer;
  }

  .slider-row { display: flex; align-items: center; gap: 10px; flex: 1; }
  input[type=range] { flex: 1; accent-color: #4f6ef7; cursor: pointer; }
  .slider-val { font-size: 12px; color: #666; min-width: 30px; text-align: right; }

  .play-btn {
    background: none;
    border: 1px solid #2a2a36;
    color: #666;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .play-btn:hover { border-color: #4f6ef7; color: #4f6ef7; }
</style>
</head>
<body>

<h1>통역기</h1>

<div class="always-on-wrap">
  <label class="toggle-switch">
    <input type="checkbox" id="alwaysOn" onchange="toggleAlwaysOn()">
    <span class="slider"></span>
  </label>
  <span class="toggle-label">항상 듣기 <span id="alwaysLabel">OFF</span></span>
</div>

<div class="lang-indicator" id="langIndicator">🌐 말하면 언어를 자동 감지해요</div>

<div class="mic-wrap">
  <button class="mic-btn" id="micBtn" onclick="toggleManual()">🎙️</button>
  <span class="mic-label" id="micLabel">눌러서 말하기</span>
</div>

<div class="results">
  <div class="result-box" id="origBox">
    <div class="result-label" id="origLabel">원문</div>
    <div class="result-text" id="origText">—</div>
  </div>
  <div class="result-box translated" id="transBox">
    <div class="result-label">번역</div>
    <div class="result-text" id="transText">—</div>
    <button class="play-btn" id="playBtn" onclick="replayLast()" style="display:none">▶ 다시 듣기</button>
  </div>
</div>

<div class="voice-section">
  <div class="voice-section-title">🔊 목소리 설정</div>
  <div class="voice-row">
    <label>목소리</label>
    <select id="voiceSelect"></select>
  </div>
  <div class="voice-row">
    <label>속도</label>
    <div class="slider-row">
      <input type="range" id="rateSlider" min="0.5" max="1.5" step="0.05" value="0.95" oninput="updateSlider('rate')">
      <span class="slider-val" id="rateVal">0.95</span>
    </div>
  </div>
  <div class="voice-row">
    <label>음높이</label>
    <div class="slider-row">
      <input type="range" id="pitchSlider" min="0.5" max="2" step="0.05" value="1" oninput="updateSlider('pitch')">
      <span class="slider-val" id="pitchVal">1.00</span>
    </div>
  </div>
  <div class="voice-row">
    <button class="play-btn" onclick="testVoice()">🔊 목소리 테스트</button>
  </div>
</div>

<script>
  let recognition = null;
  let isListening = false;
  let alwaysOn = false;
  let lastTranslated = '';
  let lastLang = 'en';
  let voices = [];
  let shouldRestart = false;

  function loadVoices() {
    voices = speechSynthesis.getVoices();
    const sel = document.getElementById('voiceSelect');
    sel.innerHTML = '';
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      sel.appendChild(opt);
    });
    const koIdx = voices.findIndex(v => v.lang.startsWith('ko'));
    if (koIdx >= 0) sel.value = koIdx;
  }

  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();

  function updateSlider(type) {
    const val = document.getElementById(type + 'Slider').value;
    document.getElementById(type + 'Val').textContent = parseFloat(val).toFixed(2);
  }

  function testVoice() {
    const text = lastLang === 'ko' ? '안녕하세요, 목소리 테스트입니다.' : 'Hello, this is a voice test.';
    speak(text, lastLang === 'ko' ? 'ko-KR' : 'en-US');
  }

  function toggleAlwaysOn() {
    alwaysOn = document.getElementById('alwaysOn').checked;
    document.getElementById('alwaysLabel').textContent = alwaysOn ? 'ON' : 'OFF';
    if (alwaysOn) {
      shouldRestart = true;
      startListening();
    } else {
      shouldRestart = false;
      stopListening();
    }
  }

  function toggleManual() {
    if (alwaysOn) return;
    if (isListening) {
      shouldRestart = false;
      stopListening();
    } else {
      startListening();
    }
  }

  function startListening() {
    if (isListening) return;
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      setLangIndicator('❌ Chrome 브라우저가 필요해요', '');
      return;
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'ko-KR';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.continuous = false;

    recognition.onstart = () => {
      isListening = true;
      document.getElementById('micBtn').classList.add('listening');
      document.getElementById('micBtn').textContent = '🎙️';
      document.getElementById('micLabel').textContent = alwaysOn ? '항상 듣기 ON' : '듣는 중...';
      setLangIndicator('👂 듣고 있어요...', '');
    };

    recognition.onresult = async (e) => {
      const transcript = e.results[0][0].transcript.trim();
      if (!transcript) return;

      const isKorean = /[\uAC00-\uD7AF\u3131-\u314E]/.test(transcript);
      const fromLang = isKorean ? 'ko' : 'en';
      const toLang = isKorean ? 'en' : 'ko';

      document.getElementById('origLabel').textContent = isKorean ? '🇰🇷 한국어 (원문)' : '🇺🇸 English (Original)';
      document.getElementById('origText').textContent = transcript;
      document.getElementById('origBox').classList.add('active');
      setLangIndicator(isKorean ? '🇰🇷 한국어 감지 → 영어 번역 중' : '🇺🇸 영어 감지 → 한국어 번역 중', isKorean ? 'ko' : 'en');

      await translate(transcript, fromLang, toLang);
    };

    recognition.onerror = (e) => {
      if (e.error !== 'no-speech') {
        setLangIndicator('오류: ' + e.error, '');
      }
    };

    recognition.onend = () => {
      isListening = false;
      document.getElementById('micBtn').classList.remove('listening');
      document.getElementById('micBtn').textContent = '🎙️';
      if (shouldRestart && alwaysOn) {
        setTimeout(() => startListening(), 400);
      } else {
        document.getElementById('micLabel').textContent = '눌러서 말하기';
      }
    };

    recognition.start();
  }

  function stopListening() {
    shouldRestart = false;
    if (recognition) { try { recognition.stop(); } catch(e) {} }
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micBtn').textContent = '🎙️';
    document.getElementById('micLabel').textContent = '눌러서 말하기';
    setLangIndicator('🌐 말하면 언어를 자동 감지해요', '');
  }

  async function translate(text, from, to) {
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      const data = await res.json();
      const translated = data[0].map(x => x[0]).join('');

      lastTranslated = translated;
      lastLang = to;

      document.getElementById('transText').textContent = translated;
      document.getElementById('transBox').classList.add('active');
      document.getElementById('playBtn').style.display = 'inline-block';
      setLangIndicator(to === 'en' ? '✅ 영어 번역 완료' : '✅ 한국어 번역 완료', to === 'ko' ? 'ko' : 'en');

      speak(translated, to === 'en' ? 'en-US' : 'ko-KR');
    } catch (err) {
      setLangIndicator('❌ 번역 실패 - 인터넷 확인', '');
    }
  }

  function speak(text, lang) {
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);

    const selIdx = document.getElementById('voiceSelect').value;
    const selVoice = voices[selIdx];
    if (selVoice) {
      utter.voice = selVoice;
    } else {
      const match = voices.find(v => v.lang.startsWith(lang.split('-')[0]));
      if (match) utter.voice = match;
    }

    utter.lang = lang;
    utter.rate = parseFloat(document.getElementById('rateSlider').value);
    utter.pitch = parseFloat(document.getElementById('pitchSlider').value);

    utter.onstart = () => {
      document.getElementById('micBtn').classList.remove('listening');
      document.getElementById('micBtn').classList.add('speaking');
      document.getElementById('micBtn').textContent = '🔊';
    };
    utter.onend = () => {
      document.getElementById('micBtn').classList.remove('speaking');
      document.getElementById('micBtn').textContent = '🎙️';
    };

    speechSynthesis.speak(utter);
  }

  function replayLast() {
    if (!lastTranslated) return;
    speak(lastTranslated, lastLang === 'ko' ? 'ko-KR' : 'en-US');
  }

  function setLangIndicator(msg, lang) {
    const el = document.getElementById('langIndicator');
    el.textContent = msg;
    el.className = 'lang-indicator' + (lang ? ' ' + lang : '');
  }
</script>
</body>
</html>
