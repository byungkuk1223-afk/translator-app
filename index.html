<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통역기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 24px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #aaa;
    text-transform: uppercase;
  }

  /* 방향 토글 */
  .mode-toggle {
    display: flex;
    background: #1e1e26;
    border-radius: 50px;
    padding: 4px;
    gap: 4px;
  }

  .mode-btn {
    padding: 10px 24px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    background: transparent;
    color: #666;
  }

  .mode-btn.active {
    background: #4f6ef7;
    color: #fff;
  }

  /* 마이크 버튼 */
  .mic-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .mic-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: none;
    background: #1e1e26;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    position: relative;
  }

  .mic-btn:hover { background: #2a2a36; transform: scale(1.05); }

  .mic-btn.recording {
    background: #e74c3c;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
    50% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
  }

  .mic-icon { font-size: 36px; }

  .mic-label {
    font-size: 13px;
    color: #555;
  }

  .mic-btn.recording + .mic-label {
    color: #e74c3c;
  }

  /* 결과 박스 */
  .results {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .result-box {
    background: #1e1e26;
    border-radius: 16px;
    padding: 20px;
    min-height: 72px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .result-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #444;
    font-weight: 600;
  }

  .result-text {
    font-size: 16px;
    line-height: 1.6;
    color: #eee;
    min-height: 24px;
  }

  .result-box.translated .result-label { color: #4f6ef7; }
  .result-box.translated .result-text { color: #fff; font-size: 18px; }

  /* 상태 표시 */
  .status {
    font-size: 13px;
    color: #444;
    height: 20px;
    text-align: center;
  }

  .status.active { color: #4f6ef7; }
  .status.error { color: #e74c3c; }

  /* TTS 재생 버튼 */
  .play-btn {
    background: none;
    border: 1px solid #333;
    color: #aaa;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    margin-top: 4px;
    width: fit-content;
    transition: all 0.2s;
  }
  .play-btn:hover { border-color: #4f6ef7; color: #4f6ef7; }
  .play-btn:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>

<h1>통역기</h1>

<!-- 방향 선택 -->
<div class="mode-toggle">
  <button class="mode-btn active" id="btn-ko-en" onclick="setMode('ko-en')">🇰🇷 한국어 → 영어 🇺🇸</button>
  <button class="mode-btn" id="btn-en-ko" onclick="setMode('en-ko')">🇺🇸 영어 → 한국어 🇰🇷</button>
</div>

<!-- 마이크 -->
<div class="mic-wrap">
  <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
    <span class="mic-icon">🎙️</span>
  </button>
  <span class="mic-label" id="micLabel">눌러서 말하기</span>
</div>

<!-- 상태 -->
<div class="status" id="status"></div>

<!-- 결과 -->
<div class="results">
  <div class="result-box">
    <div class="result-label" id="origLabel">원문</div>
    <div class="result-text" id="origText">—</div>
  </div>
  <div class="result-box translated">
    <div class="result-label" id="transLabel">번역</div>
    <div class="result-text" id="transText">—</div>
    <button class="play-btn" id="playBtn" onclick="playTranslation()" disabled>▶ 다시 듣기</button>
  </div>
</div>

<script>
  let mode = 'ko-en'; // ko-en 또는 en-ko
  let recognition = null;
  let isRecording = false;
  let lastTranslated = '';

  // 모드 설정
  function setMode(m) {
    mode = m;
    document.getElementById('btn-ko-en').classList.toggle('active', m === 'ko-en');
    document.getElementById('btn-en-ko').classList.toggle('active', m === 'en-ko');
    document.getElementById('origLabel').textContent = m === 'ko-en' ? '한국어 (원문)' : 'English (Original)';
    document.getElementById('transLabel').textContent = m === 'ko-en' ? 'English (번역)' : '한국어 (번역)';
    document.getElementById('origText').textContent = '—';
    document.getElementById('transText').textContent = '—';
    document.getElementById('playBtn').disabled = true;
    setStatus('');
  }

  // 녹음 토글
  function toggleRecording() {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  }

  function startRecording() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      setStatus('이 브라우저는 음성 인식을 지원하지 않아요. Chrome을 사용해주세요.', 'error');
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = mode === 'ko-en' ? 'ko-KR' : 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micLabel').textContent = '듣는 중... (다시 누르면 정지)';
      setStatus('듣고 있어요...', 'active');
    };

    recognition.onresult = async (e) => {
      const transcript = e.results[0][0].transcript;
      document.getElementById('origText').textContent = transcript;
      setStatus('번역 중...', 'active');
      await translate(transcript);
    };

    recognition.onerror = (e) => {
      setStatus('오류: ' + (e.error === 'no-speech' ? '말소리가 안 들려요' : e.error), 'error');
      stopRecording();
    };

    recognition.onend = () => {
      stopRecording();
    };

    recognition.start();
  }

  function stopRecording() {
    if (recognition) {
      try { recognition.stop(); } catch(e) {}
    }
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micLabel').textContent = '눌러서 말하기';
  }

  // 번역 (Google Translate 무료 엔드포인트)
  async function translate(text) {
    const from = mode === 'ko-en' ? 'ko' : 'en';
    const to   = mode === 'ko-en' ? 'en' : 'ko';
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      const data = await res.json();
      const translated = data[0].map(x => x[0]).join('');
      lastTranslated = translated;
      document.getElementById('transText').textContent = translated;
      document.getElementById('playBtn').disabled = false;
      setStatus('완료 ✓', 'active');
      playTTS(translated, to);
    } catch (err) {
      setStatus('번역 실패. 인터넷 연결을 확인해주세요.', 'error');
    }
  }

  // TTS 자동 재생
  function playTTS(text, lang) {
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang === 'en' ? 'en-US' : 'ko-KR';
    utter.rate = 0.95;
    speechSynthesis.speak(utter);
  }

  // 다시 듣기 버튼
  function playTranslation() {
    if (!lastTranslated) return;
    const to = mode === 'ko-en' ? 'en' : 'ko';
    playTTS(lastTranslated, to);
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  // 초기 라벨
  setMode('ko-en');
</script>
</body>
</html>
